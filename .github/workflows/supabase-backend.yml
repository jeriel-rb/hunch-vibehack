name: Supabase Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/supabase/**"
      - ".github/workflows/supabase-backend.yml"
  workflow_dispatch:

concurrency:
  group: supabase-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Supabase backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.105.0

      - name: Check required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_DB_PASSWORD"

      - name: Validate Edge Functions
        working-directory: backend
        run: |
          deno check --config supabase/functions/deno.json \
            supabase/functions/reveal-decision/index.ts \
            supabase/functions/consensus/index.ts
          deno test --config supabase/functions/deno.json supabase/functions/reveal-decision

      - name: Link Supabase project
        working-directory: backend
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        working-directory: backend
        run: supabase db push --linked --include-all --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Edge Functions
        working-directory: backend
        run: supabase functions deploy --use-api --project-ref "$SUPABASE_PROJECT_REF"
